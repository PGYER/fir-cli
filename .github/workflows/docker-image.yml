name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Extract version
        id: version
        run: |
          v=$(awk -F'"' '/VERSION/{print $2; exit}' lib/fir/version.rb)
          echo "result=$v" >> "$GITHUB_OUTPUT"
          echo "fir-cli version: $v"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/pgyer/fir-cli:latest
            ghcr.io/pgyer/fir-cli:${{ steps.version.outputs.result }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # docker.io is best-effort: if DOCKER_ACCESS_TOKEN isn't set yet,
      # the login below fails and the next step is skipped, but GHCR push
      # above still succeeds and the workflow remains green.
      - name: Login to Docker Hub
        id: dockerhub_login
        if: github.event_name != 'pull_request'
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: atpking
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push to Docker Hub
        if: github.event_name != 'pull_request' && steps.dockerhub_login.outcome == 'success'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            firhq/fir-cli:latest
            firhq/fir-cli:${{ steps.version.outputs.result }}
          cache-from: type=gha
